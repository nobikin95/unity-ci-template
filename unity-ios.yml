variables:
  IOS_DEVELOPMENT_TEAM: "RN7J7SQGUH"
  XCODE_DERIVED_DATA_PATH: "$CI_PROJECT_DIR/DerivedData"

.common_before_script: &common_before_script
  - |
    echo "=== [DEBUG] Submodule authentication setup ==="
    if [ -n "$GITLAB_CONFIG" ]; then echo "GITLAB_CONFIG is set: yes"; else echo "GITLAB_CONFIG is set: NO - token missing!"; fi
    echo "CI_PROJECT_DIR: $CI_PROJECT_DIR"
    echo "Submodule URLs from .gitmodules:"
    git config --file .gitmodules --get-regexp url || true
  - git clean -fdx
  - git config url."https://thanhtq:$GITLAB_CONFIG@gitlab.ikameglobal.com".insteadOf "https://gitlab.ikameglobal.com"
  - |
    echo "Git URL rewrite configured. Verifying:"
    git config --get-regexp 'url\.' || true
    echo "=== Syncing and cloning submodules (manual - GIT_SUBMODULE_STRATEGY=none) ==="
  - git submodule sync
  # Clone Assets/cicd to latest version (non-recursive)
  - |
    echo "Cloning Assets/cicd submodule..."
    git submodule update --init --remote --checkout Assets/cicd || { echo "[ERROR] Failed to clone Assets/cicd. Check GITLAB_CONFIG token (scope: read_repository) and cicd project access."; exit 1; }
    echo "Assets/cicd cloned successfully"
  # Clone all other submodules recursively (exclude Assets/cicd)
  - echo "Cloning other submodules..."
  - git config --file .gitmodules --get-regexp path | awk '$2 != "Assets/cicd" {print $2}' | xargs -r -I {} git submodule update --init --recursive --checkout {}
  - git submodule foreach 'git reset --hard'
  - git submodule foreach 'git clean -fdx'
  - echo "Setting up environment for iOS build..."
  - export PROJECT_UNITY_VERSION=$(grep "m_EditorVersion:" ProjectSettings/ProjectVersion.txt | awk '{print $2}')
  - echo "Unity version from ProjectSettings ${PROJECT_UNITY_VERSION}"
  - if [ -d "/Applications/Unity/Hub/Editor" ]; then export UNITY_INSTALLED_VERSIONS=$(ls /Applications/Unity/Hub/Editor); fi
  - echo "Available Unity versions... ${UNITY_INSTALLED_VERSIONS}"
  - export UNITY_VERSION=$(echo "$UNITY_INSTALLED_VERSIONS" | grep -E "^${PROJECT_UNITY_VERSION}" | head -n 1)
  - | # Use block scalar for multi-line if
    if [ -z "$UNITY_VERSION" ]; then
      echo "Exact version not found. Selecting closest version available...";
      export UNITY_VERSION=$(echo "$UNITY_INSTALLED_VERSIONS" | tr ' ' '\n' | sort -V | grep "^${PROJECT_UNITY_VERSION%.*}" | tail -n 1);
    fi
  - export UNITY_PATH="/Applications/Unity/Hub/Editor/${UNITY_VERSION}/Unity.app/Contents/MacOS/Unity"
  - echo "Using Unity version ${UNITY_VERSION}"
  - | # Use block scalar for multi-line if with error handling
    if [ ! -f "$UNITY_PATH" ]; then
      echo "Error... Unity executable not found at $UNITY_PATH";
      python3 Assets/cicd/ci/send_slack_webhook.py build_fail project_name="$PROJECT_NAME" platform="🍏iOS" build_type="$BUILD_TYPE" version="$CURRENT_VERSION";
      python3 Assets/cicd/ci/send_slack_direct_message.py build_fail project_name="$PROJECT_NAME" platform="🍏iOS" build_type="$BUILD_TYPE" version="$CURRENT_VERSION" notify_user="$NOTIFY_DEV" log_file="$CI_PROJECT_DIR/build_output.log";
      exit 1;
    fi
  - export CURRENT_VERSION=$IOS_VERSION
  - export MAJOR_VERSION=$(echo $CURRENT_VERSION | cut -d '.' -f1)
  - export MINOR_VERSION=$(echo $CURRENT_VERSION | cut -d '.' -f2)
  - export PATCH_VERSION=$(echo $CURRENT_VERSION | cut -d '.' -f3)
  - |
    # Normalize NOTIFY_DEV by removing spaces and ensure U043T5P1G9Z is included
    if [ -n "$NOTIFY_DEV" ]; then
      # Remove all spaces from NOTIFY_DEV
      export NOTIFY_DEV=$(echo "$NOTIFY_DEV" | tr -d ' ')
      echo "Normalized NOTIFY_DEV: $NOTIFY_DEV"
      
      # Check if U043T5P1G9Z is already in NOTIFY_DEV
      if ! echo ",$NOTIFY_DEV," | grep -q ",U043T5P1G9Z,"; then
        echo "Adding U043T5P1G9Z to NOTIFY_DEV"
        if [ -z "$NOTIFY_DEV" ]; then
          export NOTIFY_DEV="U043T5P1G9Z"
        else
          export NOTIFY_DEV="$NOTIFY_DEV,U043T5P1G9Z"
        fi
        echo "Updated NOTIFY_DEV: $NOTIFY_DEV"
      else
        echo "U043T5P1G9Z already exists in NOTIFY_DEV"
      fi
    else
      echo "NOTIFY_DEV is not set, setting to U043T5P1G9Z"
      export NOTIFY_DEV="U043T5P1G9Z"
    fi

    # Normalize SLACK_USER_IDS by removing spaces
    if [ -n "$SLACK_USER_IDS" ]; then
      # Remove all spaces from SLACK_USER_IDS
      export SLACK_USER_IDS=$(echo "$SLACK_USER_IDS" | tr -d ' ')
      echo "Normalized SLACK_USER_IDS: $SLACK_USER_IDS"
    fi
  - sed -i '' "s/\(bundleVersion:\).*/\1 \"$CURRENT_VERSION\"/" ProjectSettings/ProjectSettings.asset
  - sed -i '' "s/\(m_ShowUnitySplashLogo:\).*/\1 0/" ProjectSettings/ProjectSettings.asset
  - echo "Updated bundleVersion in ProjectSettings.asset to $CURRENT_VERSION"
  - grep "bundleVersion:" ProjectSettings/ProjectSettings.asset
  - echo "Updated m_ShowUnitySplashLogo in ProjectSettings.asset to 0"
  - grep "m_ShowUnitySplashLogo:" ProjectSettings/ProjectSettings.asset

.common_build_steps: &common_build_steps # Update Scripting Symbol
  - chmod +x Assets/cicd/ci/update_scripting_symbols.sh
  - Assets/cicd/ci/update_scripting_symbols.sh --add_define_symbol=$ADD_DEFINE_SYMBOLS --remove_define_symbol=$REMOVE_DEFINE_SYMBOLS
  - echo "Starting iOS .ipa build..."
  - mkdir -p Build/iOS
  - python3 Assets/cicd/ci/send_slack_webhook.py build_start project_name="$PROJECT_NAME" platform="🍏iOS" build_type="$BUILD_TYPE" version="$CURRENT_VERSION"
  - python3 Assets/cicd/ci/send_slack_direct_message.py build_start project_name="$PROJECT_NAME" platform="🍏iOS" notify_user="$NOTIFY_DEV" build_type="$BUILD_TYPE" version="$CURRENT_VERSION"
  - |
    # Function to perform Unity build with framework verification retry
    perform_unity_build_with_retry() {
      local max_retries=5
      local retry_count=0
      
      while [ $retry_count -lt $max_retries ]; do
        echo "🔄 Unity build attempt $((retry_count + 1))/$max_retries"
        
        # Clean previous build
        if [ $retry_count -gt 0 ]; then
          echo "🧹 Cleaning previous build..."
          rm -rf Build/iOS
        fi
        
        # Unity build
        echo "Running Unity build command with UNITY_PATH=$UNITY_PATH"
        $UNITY_PATH -projectPath $CI_PROJECT_DIR -buildTarget iOS -executeMethod BuildScript.BuildiOS -logFile $CI_PROJECT_DIR/build_output.log -batchmode -nographics -silent-crashes -quit || {
          echo "Unity build failed. Checking for validation errors...";
          
          # Check if this is a validation error (BuildFailedException)
          if grep -q "BuildFailedException" "$CI_PROJECT_DIR/build_output.log"; then
            echo "⚠️  Detected Build Validation Failure - validation errors cannot be fixed by retrying";
            echo "Error details:";
            grep -B 3 -A 3 "BuildFailedException" "$CI_PROJECT_DIR/build_output.log" | head -n 20 || echo "Could not extract error details";
            echo "✗ Build validation failed. This is a logic/data error that requires code/asset fixes.";
            
            # Send notifications and exit without retry
            python3 Assets/cicd/ci/send_slack_webhook.py build_fail project_name="$PROJECT_NAME" platform="🍏iOS" build_type="$BUILD_TYPE" version="$CURRENT_VERSION";
            python3 Assets/cicd/ci/send_slack_direct_message.py build_fail project_name="$PROJECT_NAME" platform="🍏iOS" build_type="$BUILD_TYPE" version="$CURRENT_VERSION" notify_user="$NOTIFY_DEV" log_file="$CI_PROJECT_DIR/build_output.log";
            exit 1;
          fi
          
          # Non-validation error - show log and fail
          echo "Unity build failed. Output log:";
          tail -n 50 $CI_PROJECT_DIR/build_output.log;
          python3 Assets/cicd/ci/send_slack_webhook.py build_fail project_name="$PROJECT_NAME" platform="🍏iOS" build_type="$BUILD_TYPE" version="$CURRENT_VERSION";
          python3 Assets/cicd/ci/send_slack_direct_message.py build_fail project_name="$PROJECT_NAME" platform="🍏iOS" build_type="$BUILD_TYPE" version="$CURRENT_VERSION" notify_user="$NOTIFY_DEV" log_file="$CI_PROJECT_DIR/build_output.log";
          exit 1;
        }
        
        echo "Unity build completed. Checking Build/iOS directory contents:"
        ls -l Build/iOS/
        
        # Check if Xcode project exists
        if [ ! -d "Build/iOS/Unity-iPhone.xcodeproj" ]; then
          echo "Error... Xcode project not found in Build/iOS directory after Unity build.";
          python3 Assets/cicd/ci/send_slack_webhook.py build_fail project_name="$PROJECT_NAME" platform="🍏iOS" build_type="$BUILD_TYPE" version="$CURRENT_VERSION";
          python3 Assets/cicd/ci/send_slack_direct_message.py build_fail project_name="$PROJECT_NAME" platform="🍏iOS" build_type="$BUILD_TYPE" version="$CURRENT_VERSION" notify_user="$NOTIFY_DEV" log_file="$CI_PROJECT_DIR/build_output.log";
          exit 1;
        fi
        
        echo "Validating Xcode project file..."
        plutil -lint Build/iOS/Unity-iPhone.xcodeproj/project.pbxproj || {
          echo "The Xcode project file has syntax errors.";
          python3 Assets/cicd/ci/send_slack_webhook.py build_fail project_name="$PROJECT_NAME" platform="🍏iOS" build_type="$BUILD_TYPE" version="$CURRENT_VERSION";
          python3 Assets/cicd/ci/send_slack_direct_message.py build_fail project_name="$PROJECT_NAME" platform="🍏iOS" build_type="$BUILD_TYPE" version="$CURRENT_VERSION" notify_user="$NOTIFY_DEV" log_file="$CI_PROJECT_DIR/build_output.log";
          exit 1;
        }
        
        # Fix system framework embed settings (CodeSignOnCopy added by plugins/CocoaPods after Unity PostProcessBuild)
        echo "🔧 Fixing system framework embed settings..."
        chmod +x Assets/cicd/ci/fix_system_framework_embed.sh
        Assets/cicd/ci/fix_system_framework_embed.sh

        echo "⚡ Running Xcode Framework Verification..."
        chmod +x Assets/cicd/ci/verify_frameworks.sh
        
        # Chạy verify_frameworks.sh với error handling
        echo ""
        echo "🔍 Starting framework verification..."
        if Assets/cicd/ci/verify_frameworks.sh; then
          echo ""
          echo "✅ Framework verification passed!"
          echo "🎉 All required frameworks are present and correctly configured!"
          echo ""
          break
        else
          verify_exit_code=$?
          echo ""
          echo " Framework verification failed with exit code $verify_exit_code"
          echo ""
          
          retry_count=$((retry_count + 1))
          if [ $retry_count -lt $max_retries ]; then
            echo "🔄 Retrying Unity build..."
            echo "📋 Missing frameworks detected. Will retry build..."
            echo "🔧 BuildScript.cs should automatically add all required frameworks"
            echo "⏳ Waiting 10 seconds before retry..."
            sleep 10
          else
            echo ""
            echo " Framework verification failed after $max_retries attempts."
            echo "📋 Final missing frameworks:"
            echo ""
            Assets/cicd/ci/verify_frameworks.sh || echo "Framework verification script failed"
            echo ""
            echo "💡 This might indicate an issue with the BuildScript.cs post-processing"
            echo "⚠️ Continuing with build despite framework verification issues..."
            echo ""
            break
          fi
        fi
      done
    }

    # Execute the build function
    perform_unity_build_with_retry
  - echo "Done..."
  # Thêm validation sau khi verify_frameworks.sh
  - echo "Validating Xcode project after framework verification..."
  - | # Use block scalar for command with || error handling
    plutil -lint Build/iOS/Unity-iPhone.xcodeproj/project.pbxproj || {
      echo "Xcode project file has syntax errors after framework verification.";
      echo "Attempting to restore from backup or rebuild...";
      # Nếu có backup, restore lại
      if [ -f "Build/iOS/Unity-iPhone.xcodeproj/project.pbxproj.backup" ]; then
        cp "Build/iOS/Unity-iPhone.xcodeproj/project.pbxproj.backup" "Build/iOS/Unity-iPhone.xcodeproj/project.pbxproj";
        echo "Restored project.pbxproj from backup.";
      else
        echo "No backup found. Project file may be corrupted.";
        python3 Assets/cicd/ci/send_slack_webhook.py build_fail project_name="$PROJECT_NAME" platform="🍏iOS" build_type="$BUILD_TYPE" version="$CURRENT_VERSION";
        python3 Assets/cicd/ci/send_slack_direct_message.py build_fail project_name="$PROJECT_NAME" platform="🍏iOS" build_type="$BUILD_TYPE" version="$CURRENT_VERSION" notify_user="$NOTIFY_DEV" log_file="$CI_PROJECT_DIR/build_output.log";
        exit 1;
      fi
    }
  - echo "Xcode project validation passed after framework verification."

.common_update_version: &common_update_version
  - echo "Updating IOS_VERSION in GitLab CI/CD Variables..."
  - export PATCH_VERSION=$((PATCH_VERSION + 1))
  - | # Use block scalar for multi-line if
    if [ "$PATCH_VERSION" -gt 99 ]; then
      export PATCH_VERSION=0;
      export MINOR_VERSION=$((MINOR_VERSION + 1));
    fi
  - | # Use block scalar for multi-line if
    if [ "$MINOR_VERSION" -gt 99 ]; then
      export MINOR_VERSION=0;
      export MAJOR_VERSION=$((MAJOR_VERSION + 1));
    fi
  - export NEW_VERSION="${MAJOR_VERSION}.${MINOR_VERSION}.${PATCH_VERSION}"
  - echo "Next IOS_VERSION will be $NEW_VERSION"
  - 'curl --fail -X PUT -H "PRIVATE-TOKEN: $GITLAB_API_TOKEN" -d "value=$NEW_VERSION" "https://gitlab.ikameglobal.com/api/v4/projects/$CI_PROJECT_ID/variables/IOS_VERSION"'

.handle_xcode_error_script_content:
  &handle_xcode_error_script_content error_message="$1"
  log_file="$2"
  echo "-----------------------------------------------------"
  echo "[ERROR] $error_message"
  if [ -n "$log_file" ] && [ -f "$log_file" ]; then
  echo "Last 50 lines of $log_file:"
  tail -n 50 "$log_file"
  fi
  echo "-----------------------------------------------------"
  python3 "$CI_PROJECT_DIR/Assets/cicd/ci/send_slack_webhook.py" build_fail project_name="$PROJECT_NAME" platform="🍏iOS" build_type="$BUILD_TYPE" version="$CURRENT_VERSION"
  if [ -n "$NOTIFY_DEV" ]; then
  python3 "$CI_PROJECT_DIR/Assets/cicd/ci/send_slack_direct_message.py" build_fail project_name="$PROJECT_NAME" platform="🍏iOS" build_type="$BUILD_TYPE" version="$CURRENT_VERSION" notify_user="$NOTIFY_DEV" log_file="$CI_PROJECT_DIR/build_output.log"
  fi
  exit 1

build_ios_release:
  stage: build_ios
  variables:
    GIT_SUBMODULE_STRATEGY: none
    BUILD_TYPE: "✈️Testflight"
  before_script: *common_before_script
  retry:
    max: 1
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
      - api_failure
      - unknown_failure
  tags:
    - macos
  timeout: 60m
  rules:
    - if: '$CI_COMMIT_TAG =~ /^ios-release\/bundle.*$/'
      when: on_success
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
  script:
    - |
      handle_xcode_error() {
        error_message="$1"
        log_file="$2"
        echo "-----------------------------------------------------"
        echo "[ERROR] $error_message"
        if [ -n "$log_file" ] && [ -f "$log_file" ]; then
          echo "Last 50 lines of $log_file:"
          tail -n 50 "$log_file"
        fi
        echo "-----------------------------------------------------"
        python3 "$CI_PROJECT_DIR/Assets/cicd/ci/send_slack_webhook.py" build_fail project_name="$PROJECT_NAME" platform="🍏iOS" build_type="$BUILD_TYPE" version="$CURRENT_VERSION"
        if [ -n "$NOTIFY_DEV" ]; then
          python3 "$CI_PROJECT_DIR/Assets/cicd/ci/send_slack_direct_message.py" build_fail project_name="$PROJECT_NAME" platform="🍏iOS" build_type="$BUILD_TYPE" version="$CURRENT_VERSION" notify_user="$NOTIFY_DEV" log_file="$CI_PROJECT_DIR/build_output.log"
        fi
        exit 1
      }
    - *common_build_steps

    # Fetch changelog for iOS release tags
    - echo "Fetching changelog..."
    - chmod +x Assets/cicd/ci/fetch_changelog.sh
    - bash Assets/cicd/ci/fetch_changelog.sh --target_branch="ios-release" --tag="$CI_COMMIT_TAG"

    # Read changelog from file
    - |
      if [ -f "changelog.txt" ]; then
        export CHANGELOG=$(cat changelog.txt)
      else
        export CHANGELOG="No changelog available"
      fi
    - echo "Final Changelog:"
    - echo "$CHANGELOG"

    - echo "Loading Slack message template..."
    - export MESSAGE_TEMPLATES_FILE="$CI_PROJECT_DIR/Assets/cicd/ci/message_templates.json"
    - | # Use block scalar for multi-line script
      template_key="build_start"
      if [ ! -f "$MESSAGE_TEMPLATES_FILE" ]; then
        echo "[ERROR] Message template file not found: $MESSAGE_TEMPLATES_FILE"
        exit 1
      fi
      message=$(jq -r --arg key "$template_key" '.[$key]' "$MESSAGE_TEMPLATES_FILE")

      if [ -z "$message" ] || [ "$message" == "null" ]; then
        echo "[ERROR] Message template not found for key: $template_key in $MESSAGE_TEMPLATES_FILE"
        exit 1
      fi

      start_build_message=$(printf "$message" | sed \
        -e "s/{project_name}/${PROJECT_NAME}/g" \
        -e "s/{platform}/🍏iOS/g" \
        -e "s/{build_type}/${BUILD_TYPE}/g" \
        -e "s/{version}/${CURRENT_VERSION}/g")

      echo "Formatted Slack message:"
      echo "$start_build_message"
    - python3 Assets/cicd/ci/send_slack_message.py "C07UU3A6H0R" "$start_build_message" "$SLACK_BOT_TOKEN"
    # Add step to clean DerivedData before Xcode build
    - echo "Ensuring clean build environment by removing previous DerivedData..."
    - rm -rf "$XCODE_DERIVED_DATA_PATH"

    # Fix MolocoSDK signature issue (revoked certificate)
    - echo "Applying MolocoSDK signature fix..."
    - chmod +x "$CI_PROJECT_DIR/Assets/cicd/ci/fix_moloco_signature.sh"
    - |
      "$CI_PROJECT_DIR/Assets/cicd/ci/fix_moloco_signature.sh" || echo "⚠️  MolocoSDK fix script had issues, continuing..."
    - echo "Building .ipa file using Xcode with automatic signing..."
    - cd Build/iOS

    # Fix absolute paths in pbxproj (makes project portable for backup/other machines)
    - |
      PBXPROJ="Unity-iPhone.xcodeproj/project.pbxproj"
      if [ -f "$PBXPROJ" ]; then
        cp "$PBXPROJ" "$PBXPROJ.pathfix_backup"
        FIXED=0
        # Strip absolute CI runner paths: "/Users/.../Build/iOS/X" → "X"
        if grep -q '"/Users/.*Build/iOS/' "$PBXPROJ" 2>/dev/null; then
          perl -pe 's{"/Users/[^"]*/Build/iOS/}{"}g' \
            "$PBXPROJ" > "$PBXPROJ.tmp" && mv "$PBXPROJ.tmp" "$PBXPROJ"
          FIXED=1
        fi
        # Strip unquoted absolute paths in build settings: = /Users/.../Build/iOS/X → = X
        if grep -q '= /Users/.*Build/iOS/' "$PBXPROJ" 2>/dev/null; then
          perl -pe 's{(?<==\s)/Users/[^\s";]*/Build/iOS/}{}g' \
            "$PBXPROJ" > "$PBXPROJ.tmp" && mv "$PBXPROJ.tmp" "$PBXPROJ"
          FIXED=1
        fi
        # Strip Build/iOS/ prefix only in known build settings (not in shellScript)
        if grep -qE '(CODE_SIGN_ENTITLEMENTS|INFOPLIST_FILE|path|name)\s*=\s*"?Build/iOS/' "$PBXPROJ" 2>/dev/null; then
          perl -pe 's{((?:CODE_SIGN_ENTITLEMENTS|INFOPLIST_FILE|path|name)\s*=\s*"?)Build/iOS/}{$1}g' \
            "$PBXPROJ" > "$PBXPROJ.tmp" && mv "$PBXPROJ.tmp" "$PBXPROJ"
          FIXED=1
        fi
        # Validate the file after fixes
        if [ "$FIXED" = "1" ]; then
          if grep -q "archiveVersion" "$PBXPROJ"; then
            echo "✅ Fixed absolute paths in Xcode project (portable for backup)"
            rm -f "$PBXPROJ.pathfix_backup"
          else
            echo "⚠️ Path fix may have corrupted pbxproj, restoring backup"
            mv "$PBXPROJ.pathfix_backup" "$PBXPROJ"
          fi
        else
          rm -f "$PBXPROJ.pathfix_backup"
        fi
      fi

    - | # Fix framework CFBundleShortVersionString (Apple requires max 3 parts)
      # Some third-party SDKs (AppLovin adapters) use 4+ part versions that cause upload rejection
      echo "🔧 Fixing framework version strings..."
      chmod +x "$CI_PROJECT_DIR/Assets/cicd/ci/fix_framework_versions.sh"
      "$CI_PROJECT_DIR/Assets/cicd/ci/fix_framework_versions.sh" "."

    # Check and create workspace if needed
    - chmod +x "$CI_PROJECT_DIR/Assets/cicd/ci/create_workspace.sh"
    - "$CI_PROJECT_DIR/Assets/cicd/ci/create_workspace.sh"

    - | # Use block scalar for the entire multi-line if/then/else/fi block
      if [ -d "Unity-iPhone.xcworkspace" ]; then
        echo "Found Xcode workspace. Building with xcodebuild...";
        export ARCHIVE_PATH="$CI_PROJECT_DIR/Build/iOS/${PROJECT_NAME}_${CURRENT_VERSION}.xcarchive"
        export EXPORT_LOG_PATH="$CI_PROJECT_DIR/export_release.log"
        export ARCHIVE_LOG_PATH="$CI_PROJECT_DIR/archive_release.log"

        echo "Archiving to $ARCHIVE_PATH"
        xcodebuild -workspace Unity-iPhone.xcworkspace -scheme Unity-iPhone -configuration Release \
          -archivePath "$ARCHIVE_PATH" \
          -allowProvisioningUpdates -allowProvisioningDeviceRegistration \
          DEVELOPMENT_TEAM="$IOS_DEVELOPMENT_TEAM" \
          -quiet archive -derivedDataPath "$XCODE_DERIVED_DATA_PATH" \
          > "$ARCHIVE_LOG_PATH" 2>&1 || handle_xcode_error "Xcode archive step failed." "$ARCHIVE_LOG_PATH"
        echo "✅ Archive completed successfully"

        echo "Exporting archive with automatic signing..."
        if [ ! -f "$CI_PROJECT_DIR/Assets/cicd/exportOptionsPlist.plist" ]; then
           handle_xcode_error "exportOptionsPlist.plist not found at $CI_PROJECT_DIR/Assets/cicd/"
        fi
        xcodebuild -exportArchive -archivePath "$ARCHIVE_PATH" \
          -exportPath "$CI_PROJECT_DIR/Build/iOS/ExportedIPA_Release" \
          -exportOptionsPlist "$CI_PROJECT_DIR/Assets/cicd/exportOptionsPlist.plist" \
          -allowProvisioningUpdates \
          -quiet \
          > "$EXPORT_LOG_PATH" 2>&1 || handle_xcode_error "Xcode export step failed." "$EXPORT_LOG_PATH"
        echo "✅ Export completed successfully"

        echo "IPA file exported successfully to ExportedIPA_Release directory.";
      elif [ -d "Unity-iPhone.xcodeproj" ]; then
        echo "Found Xcode project. Building with xcodebuild...";
        export ARCHIVE_PATH="$CI_PROJECT_DIR/Build/iOS/${PROJECT_NAME}_${CURRENT_VERSION}.xcarchive"
        export EXPORT_LOG_PATH="$CI_PROJECT_DIR/export_release.log"
        export ARCHIVE_LOG_PATH="$CI_PROJECT_DIR/archive_release.log"

        echo "Archiving to $ARCHIVE_PATH"
        xcodebuild -project Unity-iPhone.xcodeproj -scheme Unity-iPhone -configuration Release \
          -archivePath "$ARCHIVE_PATH" \
          -allowProvisioningUpdates -allowProvisioningDeviceRegistration \
          DEVELOPMENT_TEAM="$IOS_DEVELOPMENT_TEAM" \
          -quiet archive -derivedDataPath "$XCODE_DERIVED_DATA_PATH" \
          > "$ARCHIVE_LOG_PATH" 2>&1 || handle_xcode_error "Xcode archive step failed." "$ARCHIVE_LOG_PATH"
        echo "✅ Archive completed successfully"

        echo "Exporting archive with automatic signing..."
        if [ ! -f "$CI_PROJECT_DIR/Assets/cicd/exportOptionsPlist.plist" ]; then
           handle_xcode_error "exportOptionsPlist.plist not found at $CI_PROJECT_DIR"
        fi
        xcodebuild -exportArchive -archivePath "$ARCHIVE_PATH" \
          -exportPath "$CI_PROJECT_DIR/Build/iOS/ExportedIPA_Release" \
          -exportOptionsPlist "$CI_PROJECT_DIR/Assets/cicd/exportOptionsPlist.plist" \
          -allowProvisioningUpdates \
          -quiet \
          > "$EXPORT_LOG_PATH" 2>&1 || handle_xcode_error "Xcode export step failed." "$EXPORT_LOG_PATH"
        echo "✅ Export completed successfully"

        echo "IPA file exported successfully to ExportedIPA_Release directory.";
      else
        handle_xcode_error "No Xcode workspace or project found in Build/iOS."
      fi

    # Upload IPA to TestFlight using Fastlane
    - cd "$CI_PROJECT_DIR"
    - echo "=================================================="
    - echo "📤 Uploading IPA to TestFlight using Fastlane..."
    - echo "=================================================="

    # Verify IPA file exists
    - |
      IPA_FILE=$(find Build/iOS/ExportedIPA_Release -name "*.ipa" | head -1)
      if [ -z "$IPA_FILE" ]; then
        handle_xcode_error "No IPA file found in Build/iOS/ExportedIPA_Release"
      fi
      echo "Found IPA file: $IPA_FILE"
      IPA_SIZE=$(ls -lh "$IPA_FILE" | awk '{print $5}')
      echo "IPA file size: $IPA_SIZE"

    # Setup Fastlane
    - echo "Setting up Fastlane configuration..."
    - mkdir -p fastlane
    - cp Assets/cicd/ci/deploy/Fastfile fastlane/Fastfile

    # Verify required environment variables
    - |
      if [ -z "$APP_STORE_KEY_BASE64" ]; then
        handle_xcode_error "APP_STORE_KEY_BASE64 environment variable is not set"
      fi
      if [ -z "$APP_STORE_KEY_ID" ]; then
        handle_xcode_error "APP_STORE_KEY_ID environment variable is not set"
      fi
      if [ -z "$APP_STORE_ISSUER_ID" ]; then
        handle_xcode_error "APP_STORE_ISSUER_ID environment variable is not set"
      fi
      echo "✅ All required environment variables are set"
      echo "🔍 Debug: APP_STORE_KEY_ID = $APP_STORE_KEY_ID"
      echo "🔍 Debug: APP_STORE_ISSUER_ID = $APP_STORE_ISSUER_ID"
      echo "🔍 Debug: APP_STORE_KEY_BASE64 length = ${#APP_STORE_KEY_BASE64}"

    # Export environment variables for Fastlane (explicitly export all required vars)
    - export APP_STORE_KEY_BASE64="$APP_STORE_KEY_BASE64"
    - export APP_STORE_KEY_ID="$APP_STORE_KEY_ID"
    - export APP_STORE_ISSUER_ID="$APP_STORE_ISSUER_ID"
    - export FASTLANE_SKIP_INTERACTIVE=1
    - export FASTLANE_HIDE_TIMESTAMP=1

    # Run Fastlane upload
    - echo "Starting Fastlane upload to TestFlight..."
    - export FL_APPLE_TRANSPORT_LOG_LEVEL=detailed
    - |
      set -o pipefail
      if fastlane upload_testflight --verbose 2>&1 | tee fastlane_upload.log; then
        echo "✅ Fastlane upload completed successfully!"
      else
        FASTLANE_EXIT=$?
        echo ""
        echo "❌ Fastlane upload failed (exit code: $FASTLANE_EXIT)"
        echo "--- Last 50 lines of upload log ---"
        tail -n 50 fastlane_upload.log
        echo "--- End of upload log ---"
        handle_xcode_error "Fastlane upload to TestFlight failed" "fastlane_upload.log"
      fi

    - cd "$CI_PROJECT_DIR"
    - *common_update_version

    # Retrieve changelog
    - |
      if [ -f "changelog.txt" ]; then
        export CHANGELOG=$(cat changelog.txt)
        echo "Changelog retrieved from changelog.txt:"
        echo "$CHANGELOG"
      else
        export CHANGELOG="No changelog available"
        echo "No changelog.txt found. Using default message."
      fi

    #
    # Send slack message with changelog
    - echo "Loading Slack message template..."
    - export MESSAGE_TEMPLATES_FILE="$CI_PROJECT_DIR/Assets/cicd/ci/message_templates.json"
    - | # Use block scalar for multi-line script
      if [ -z "$SLACK_USER_IDS" ]; then export NOTIFY_USERS=""; else export NOTIFY_USERS=$(echo "$SLACK_USER_IDS" | awk -F',' '{for (i=1; i<=NF; i++) printf "<@%s> ", $i}'); fi
      template_key="uploaded_to_test_flight"
      if [ ! -f "$MESSAGE_TEMPLATES_FILE" ]; then
        echo "[ERROR] Message template file not found: $MESSAGE_TEMPLATES_FILE"
        exit 1
      fi
      message=$(jq -r --arg key "$template_key" '.[$key]' "$MESSAGE_TEMPLATES_FILE")

      if [ -z "$message" ] || [ "$message" == "null" ]; then
        echo "[ERROR] Message template not found for key: $template_key in $MESSAGE_TEMPLATES_FILE"
        exit 1
      fi

      # Add changelog to the message
      formatted_message=$(printf "$message\n\n📝 *Change Log:*\n\`\`\`\n%s\n\`\`\`\n\n%s" "$CHANGELOG" "${NOTIFY_USERS}" | sed \
        -e "s/{project_name}/${PROJECT_NAME}/g" \
        -e "s/{platform}/🍏iOS/g" \
        -e "s/{build_name}/${CURRENT_VERSION}/g")

      echo "Formatted Slack message:"
      echo "$formatted_message"

    - python3 "$CI_PROJECT_DIR/Assets/cicd/ci/send_slack_message.py" "$SLACK_CHANNEL_ID" "$formatted_message" "$SLACK_BOT_TOKEN"

  after_script:
    # Ensure we're in the correct working directory
    - echo "📍 Ensuring correct working directory..."
    - cd "$CI_PROJECT_DIR" || { echo " Failed to change to CI_PROJECT_DIR"; exit 1; }
    - echo "✅ Current directory $(pwd)"

    # Wait for file system sync (important on macOS APFS)
    - echo "⏳ Waiting for file system sync..."
    - sleep 3
    - sync

    # Debug: Display directory structure
    - echo "🔍 Project directory structure:"
    - echo "   - CI_PROJECT_DIR $CI_PROJECT_DIR"
    - echo "   - Current PWD $(pwd)"
    - echo "   - Disk usage:"
    - du -sh "$CI_PROJECT_DIR" 2>/dev/null || echo "Cannot calculate size"
    - |
      echo "   - Top-level contents:"
      ls -lah "$CI_PROJECT_DIR" | head -20 || echo "Cannot list directory"
    - |
      if [ -d "$CI_PROJECT_DIR/Build/iOS" ]; then
        echo "   - Build/iOS contents:"
        ls -lah "$CI_PROJECT_DIR/Build/iOS" | head -20 || echo "Cannot list Build/iOS"
      else
        echo "   - Build/iOS directory does not exist"
      fi

    # Verify external disk
    - echo ""
    - echo "🔍 Verifying external disk before backup..."
    - chmod +x "$CI_PROJECT_DIR/Assets/cicd/ci/verify_external_disk.sh"
    - "$CI_PROJECT_DIR/Assets/cicd/ci/verify_external_disk.sh"

    # Start backup process
    - echo ""
    - echo "🔧 Starting full project backup with enhanced verification..."
    - chmod +x "$CI_PROJECT_DIR/Assets/cicd/ci/backup_ios_build.sh"
    - "$CI_PROJECT_DIR/Assets/cicd/ci/backup_ios_build.sh"

    # ========================================
    # 🧹 STORAGE CLEANUP (After backup)
    # ========================================
    - echo ""
    - echo "🧹 Starting storage cleanup to free disk space..."

    # 1. Clean DerivedData (CRITICAL - 5-15GB)
    - echo "  → Cleaning DerivedData..."
    - rm -rf "$XCODE_DERIVED_DATA_PATH" || true
    - echo "  ✅ DerivedData cleaned"

    # 2. Clean build artifacts (IMPORTANT - 10-15GB)
    - echo "  → Cleaning archives and exported IPAs..."
    - rm -rf Build/iOS/*.xcarchive || true
    - rm -rf Build/iOS/ExportedIPA_Release || true
    - echo "  ✅ Build artifacts cleaned"

    # 3. Clean log files
    - echo "  → Cleaning log files..."
    - rm -f changelog.* || true
    - echo "  ✅ Log files cleaned"

    - echo "✅ Storage cleanup completed!"
    - echo "📊 Remaining disk space:"
    - df -h | grep -E 'Filesystem|disk' || df -h

  artifacts:
    paths:
      - build_output.log
      - archive_release.log
      - export_release.log
      - fastlane_upload.log
      - itms_transporter.log
      - fastlane/
    when: always
    expire_in: 1 days

build_ios_ipa:
  stage: build_ios
  variables:
    GIT_SUBMODULE_STRATEGY: none
    BUILD_TYPE: "IPA"
  before_script: *common_before_script
  retry:
    max: 1
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
      - api_failure
      - unknown_failure
  tags:
    - macos
  timeout: 60m
  rules:
    - if: '$CI_COMMIT_TAG =~ /^ios-develop\/ver_/'
      when: on_success
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_REF_NAME == "ios-develop"'
      when: manual
  script:
    - |
      handle_xcode_error() {
        error_message="$1"
        log_file="$2"
        echo "-----------------------------------------------------"
        echo "[ERROR] $error_message"
        if [ -n "$log_file" ] && [ -f "$log_file" ]; then
          echo "Last 50 lines of $log_file:"
          tail -n 50 "$log_file"
        fi
        echo "-----------------------------------------------------"
        python3 "$CI_PROJECT_DIR/Assets/cicd/ci/send_slack_webhook.py" build_fail project_name="$PROJECT_NAME" platform="🍏iOS" build_type="$BUILD_TYPE" version="$CURRENT_VERSION"
        if [ -n "$NOTIFY_DEV" ]; then
          python3 "$CI_PROJECT_DIR/Assets/cicd/ci/send_slack_direct_message.py" build_fail project_name="$PROJECT_NAME" platform="🍏iOS" build_type="$BUILD_TYPE" version="$CURRENT_VERSION" notify_user="$NOTIFY_DEV" log_file="$CI_PROJECT_DIR/build_output.log"
        fi
        exit 1
      }
    - *common_build_steps

    # Add Firebase Debug argument to Xcode scheme (DEVELOPMENT BUILD ONLY)
    - echo "🔥 Adding Firebase Debug argument to Xcode scheme..."
    - chmod +x Assets/cicd/ci/add_firebase_debug_argument.py
    - python3 Assets/cicd/ci/add_firebase_debug_argument.py Build/iOS
    - echo "✅ Firebase Debug argument added to Xcode scheme"

    - MAIN_DEV="U043T5P1G9Z"
    # Firebase Debug View is automatically configured during Unity build
    # The BuildScript.cs post-processing adds debug flags to Info.plist
    # This works reliably for exported IPAs (not just Xcode runs)

    # Add step to clean DerivedData before Xcode build
    - echo "Ensuring clean build environment by removing previous DerivedData..."
    - rm -rf "$XCODE_DERIVED_DATA_PATH"

    # Fix MolocoSDK signature issue (revoked certificate)
    - echo "Applying MolocoSDK signature fix..."
    - chmod +x "$CI_PROJECT_DIR/Assets/cicd/ci/fix_moloco_signature.sh"
    - |
      "$CI_PROJECT_DIR/Assets/cicd/ci/fix_moloco_signature.sh" || echo "⚠️  MolocoSDK fix script had issues, continuing..."
    - echo "Building .ipa file using Xcode with automatic signing..."
    - cd Build/iOS

    # Fix absolute paths in pbxproj (makes project portable for backup/other machines)
    - |
      PBXPROJ="Unity-iPhone.xcodeproj/project.pbxproj"
      if [ -f "$PBXPROJ" ]; then
        cp "$PBXPROJ" "$PBXPROJ.pathfix_backup"
        FIXED=0
        # Strip absolute CI runner paths: "/Users/.../Build/iOS/X" → "X"
        if grep -q '"/Users/.*Build/iOS/' "$PBXPROJ" 2>/dev/null; then
          perl -pe 's{"/Users/[^"]*/Build/iOS/}{"}g' \
            "$PBXPROJ" > "$PBXPROJ.tmp" && mv "$PBXPROJ.tmp" "$PBXPROJ"
          FIXED=1
        fi
        # Strip unquoted absolute paths in build settings: = /Users/.../Build/iOS/X → = X
        if grep -q '= /Users/.*Build/iOS/' "$PBXPROJ" 2>/dev/null; then
          perl -pe 's{(?<==\s)/Users/[^\s";]*/Build/iOS/}{}g' \
            "$PBXPROJ" > "$PBXPROJ.tmp" && mv "$PBXPROJ.tmp" "$PBXPROJ"
          FIXED=1
        fi
        # Strip Build/iOS/ prefix only in known build settings (not in shellScript)
        if grep -qE '(CODE_SIGN_ENTITLEMENTS|INFOPLIST_FILE|path|name)\s*=\s*"?Build/iOS/' "$PBXPROJ" 2>/dev/null; then
          perl -pe 's{((?:CODE_SIGN_ENTITLEMENTS|INFOPLIST_FILE|path|name)\s*=\s*"?)Build/iOS/}{$1}g' \
            "$PBXPROJ" > "$PBXPROJ.tmp" && mv "$PBXPROJ.tmp" "$PBXPROJ"
          FIXED=1
        fi
        # Validate the file after fixes
        if [ "$FIXED" = "1" ]; then
          if grep -q "archiveVersion" "$PBXPROJ"; then
            echo "✅ Fixed absolute paths in Xcode project (portable for backup)"
            rm -f "$PBXPROJ.pathfix_backup"
          else
            echo "⚠️ Path fix may have corrupted pbxproj, restoring backup"
            mv "$PBXPROJ.pathfix_backup" "$PBXPROJ"
          fi
        else
          rm -f "$PBXPROJ.pathfix_backup"
        fi
      fi

    - | # Fix framework CFBundleShortVersionString (Apple requires max 3 parts)
      echo "🔧 Fixing framework version strings..."
      chmod +x "$CI_PROJECT_DIR/Assets/cicd/ci/fix_framework_versions.sh"
      "$CI_PROJECT_DIR/Assets/cicd/ci/fix_framework_versions.sh" "."

    # Check and create workspace if needed
    - chmod +x "$CI_PROJECT_DIR/Assets/cicd/ci/create_workspace.sh"
    - "$CI_PROJECT_DIR/Assets/cicd/ci/create_workspace.sh"

    - | # Use block scalar for multi-line if statement
      if [ -d "Unity-iPhone.xcworkspace" ]; then
        echo "Found Xcode workspace. Building with xcodebuild...";
        export ARCHIVE_PATH="$CI_PROJECT_DIR/Build/iOS/${PROJECT_NAME}_${CURRENT_VERSION}_dev.xcarchive"
        export EXPORT_LOG_PATH="$CI_PROJECT_DIR/export_dev.log"
        export ARCHIVE_LOG_PATH="$CI_PROJECT_DIR/archive_dev.log"

        echo "Archiving to $ARCHIVE_PATH"
        echo "🔥 Building with Firebase Debug enabled (configured in Info.plist by Unity BuildScript)..."
        xcodebuild -workspace Unity-iPhone.xcworkspace -scheme Unity-iPhone -configuration Release \
          -archivePath "$ARCHIVE_PATH" \
          -allowProvisioningUpdates -allowProvisioningDeviceRegistration \
          DEVELOPMENT_TEAM="$IOS_DEVELOPMENT_TEAM" \
          -quiet archive -derivedDataPath "$XCODE_DERIVED_DATA_PATH" \
          > "$ARCHIVE_LOG_PATH" 2>&1 || handle_xcode_error "Xcode archive step failed." "$ARCHIVE_LOG_PATH"
        echo "✅ Archive completed successfully"

        echo "Exporting archive with automatic signing..."

        if [ ! -f "$CI_PROJECT_DIR/Assets/cicd/exportOptionsPlist_dev.plist" ]; then
          handle_xcode_error "exportOptionsPlist_dev.plist not found at $CI_PROJECT_DIR/Assets/cicd/"
        fi

        # Simple export with automatic signing
        echo "🎯 Exporting with development method (có thể cài trên máy macOS khác)..."
        OUTPUT_DIR="$CI_PROJECT_DIR/Build/iOS"
        mkdir -p "$OUTPUT_DIR"

        if xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$OUTPUT_DIR/ExportedIPA_Dev" \
            -exportOptionsPlist "$CI_PROJECT_DIR/Assets/cicd/exportOptionsPlist_dev.plist" \
            -allowProvisioningUpdates \
            > "$EXPORT_LOG_PATH" 2>&1; then

          echo "✅ Export completed successfully!"

          # Find and verify IPA file
          EXPORTED_IPA=$(find "$OUTPUT_DIR/ExportedIPA_Dev" -name "*.ipa" | head -1)
          if [ -n "$EXPORTED_IPA" ] && [ -f "$EXPORTED_IPA" ]; then
            IPA_SIZE=$(ls -lh "$EXPORTED_IPA" | awk '{print $5}')
            echo "📱 IPA created successfully:"
            echo "   File: $EXPORTED_IPA"
            echo "   Size: $IPA_SIZE"
          else
            echo "⚠️  Export succeeded but IPA not found in expected location"
          fi

        else
          echo " Export failed"
          handle_xcode_error "Xcode export step failed." "$EXPORT_LOG_PATH"
        fi

      elif [ -d "Unity-iPhone.xcodeproj" ]; then
        echo "Found Xcode project. Building with xcodebuild...";
        export ARCHIVE_PATH="$CI_PROJECT_DIR/Build/iOS/${PROJECT_NAME}_${CURRENT_VERSION}_dev.xcarchive"
        export EXPORT_LOG_PATH="$CI_PROJECT_DIR/export_dev.log"
        export ARCHIVE_LOG_PATH="$CI_PROJECT_DIR/archive_dev.log"

        echo "Archiving to $ARCHIVE_PATH"
        echo "🔥 Building with Firebase Debug enabled (configured in Info.plist by Unity BuildScript)..."
        xcodebuild -project Unity-iPhone.xcodeproj -scheme Unity-iPhone -configuration Release \
          -archivePath "$ARCHIVE_PATH" \
          -allowProvisioningUpdates -allowProvisioningDeviceRegistration \
          DEVELOPMENT_TEAM="$IOS_DEVELOPMENT_TEAM" \
          -quiet archive -derivedDataPath "$XCODE_DERIVED_DATA_PATH" \
          > "$ARCHIVE_LOG_PATH" 2>&1 || handle_xcode_error "Xcode archive step failed." "$ARCHIVE_LOG_PATH"
        echo "✅ Archive completed successfully"

        echo "Exporting archive with automatic signing..."

        if [ ! -f "$CI_PROJECT_DIR/Assets/cicd/exportOptionsPlist_dev.plist" ]; then
          handle_xcode_error "exportOptionsPlist_dev.plist not found at $CI_PROJECT_DIR/Assets/cicd/"
        fi

        echo "🎯 Exporting with development method (có thể cài trên máy macOS khác)..."
        xcodebuild -exportArchive -archivePath "$ARCHIVE_PATH" \
          -exportPath "$CI_PROJECT_DIR/Build/iOS/ExportedIPA_Dev" \
          -exportOptionsPlist "$CI_PROJECT_DIR/Assets/cicd/exportOptionsPlist_dev.plist" \
          -allowProvisioningUpdates \
          -quiet \
          > "$EXPORT_LOG_PATH" 2>&1 || handle_xcode_error "Xcode export step failed." "$EXPORT_LOG_PATH"
        echo "✅ Export completed successfully"

        # Look for IPA file in the correct location
        echo "🔍 Searching for IPA file in Build/iOS directory..."

        IPA_FILE=$(find "$CI_PROJECT_DIR/Build/iOS" -name "*.ipa" | head -n 1)
        if [ -n "$IPA_FILE" ] && [ -f "$IPA_FILE" ]; then
          IPA_SIZE=$(ls -lh "$IPA_FILE" | awk '{print $5}')
          echo "✅ Found IPA: $IPA_FILE"
          echo "📊 IPA Size: $IPA_SIZE"
        else
          echo " Could not find IPA file"
          echo "🔍 Available files:"
          find "$CI_PROJECT_DIR/Build/iOS" -name "*.ipa" -o -name "*.app" 2>/dev/null | head -5 || echo "No files found"
        fi
      else
        handle_xcode_error "No Xcode workspace or project found in Build/iOS."
      fi
    - cd "$CI_PROJECT_DIR"
    - *common_update_version

    # Upload IPA file to Slack channel
    - SLACK_CHANNEL_ID="C07UU3A6H0R"
    - |
      echo "📤 Uploading IPA file to Slack channel..."
      IPA_FILE=$(find "$CI_PROJECT_DIR/Build/iOS" -name "*.ipa" | head -n 1)
      if [ -n "$IPA_FILE" ] && [ -f "$IPA_FILE" ]; then
        echo "Found IPA file: $IPA_FILE"
        python3 "$CI_PROJECT_DIR/Assets/cicd/ci/upload_slack.py" "$IPA_FILE" "IPA Build - $PROJECT_NAME v$CURRENT_VERSION" "$SLACK_USER_IDS"
        echo "✅ IPA file uploaded to Slack"
      else
        echo "❌ No IPA file found to upload"
      fi

  after_script:
    # Ensure we're in the correct working directory
    - echo "📍 Ensuring correct working directory..."
    - cd "$CI_PROJECT_DIR" || { echo " Failed to change to CI_PROJECT_DIR"; exit 1; }
    - echo "✅ Current directory $(pwd)"

    # Wait for file system sync (important on macOS APFS)
    - echo "⏳ Waiting for file system sync..."
    - sleep 3
    - sync

    # Debug: Display directory structure
    - echo "🔍 Project directory structure:"
    - echo "   - CI_PROJECT_DIR $CI_PROJECT_DIR"
    - echo "   - Current PWD $(pwd)"
    - echo "   - Disk usage:"
    - du -sh "$CI_PROJECT_DIR" 2>/dev/null || echo "Cannot calculate size"
    - |
      echo "   - Top-level contents:"
      ls -lah "$CI_PROJECT_DIR" | head -20 || echo "Cannot list directory"
    - |
      if [ -d "$CI_PROJECT_DIR/Build/iOS" ]; then
        echo "   - Build/iOS contents:"
        ls -lah "$CI_PROJECT_DIR/Build/iOS" | head -20 || echo "Cannot list Build/iOS"
      else
        echo "   - Build/iOS directory does not exist"
      fi

    # Verify external disk
    - echo ""
    - echo "🔍 Verifying external disk before backup..."
    - chmod +x "$CI_PROJECT_DIR/Assets/cicd/ci/verify_external_disk.sh"
    - "$CI_PROJECT_DIR/Assets/cicd/ci/verify_external_disk.sh"

    # Start backup process
    - echo ""
    - echo "🔧 Starting full project backup with enhanced verification..."
    - chmod +x "$CI_PROJECT_DIR/Assets/cicd/ci/backup_ios_build.sh"
    - "$CI_PROJECT_DIR/Assets/cicd/ci/backup_ios_build.sh"

    # ========================================
    # 🧹 STORAGE CLEANUP (After backup)
    # ========================================
    - echo ""
    - echo "🧹 Starting storage cleanup to free disk space..."

    # 1. Clean DerivedData (CRITICAL - 5-15GB)
    - echo "  → Cleaning DerivedData..."
    - rm -rf "$XCODE_DERIVED_DATA_PATH" || true
    - echo "  ✅ DerivedData cleaned"

    # 2. Clean build artifacts (IMPORTANT - 10-15GB)
    - echo "  → Cleaning archives and exported IPAs..."
    - rm -rf Build/iOS/*.xcarchive || true
    - rm -rf Build/iOS/ExportedIPA_Dev || true
    - echo "  ✅ Build artifacts cleaned"

    # 3. Clean log files
    - echo "  → Cleaning log files..."
    - rm -f changelog.* || true
    - echo "  ✅ Log files cleaned"

    - echo "✅ Storage cleanup completed!"
    - echo "📊 Remaining disk space:"
    - df -h | grep -E 'Filesystem|disk' || df -h

  artifacts:
    paths:
      - build_output.log
      - archive_dev.log
      - export_dev.log
    when: always
    expire_in: 1 days

build_xcode_project:
  stage: build_self_test
  variables:
    GIT_SUBMODULE_STRATEGY: none
    BUILD_TYPE: "Xcode Project"
  before_script: *common_before_script
  retry:
    max: 1
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
      - api_failure
      - unknown_failure
  tags:
    - macos
  timeout: 60m
  rules:
    - if: "$CI_COMMIT_TAG =~ /ios-xcode/"
      when: manual
  script:
    - *common_build_steps

    # Fix MolocoSDK signature issue (revoked certificate)
    - echo "Applying MolocoSDK signature fix..."
    - chmod +x "$CI_PROJECT_DIR/Assets/cicd/ci/fix_moloco_signature.sh"
    - |
      "$CI_PROJECT_DIR/Assets/cicd/ci/fix_moloco_signature.sh" || echo "⚠️  MolocoSDK fix script had issues, continuing..."
    - echo "✅ Xcode project build completed successfully!"
    - echo "📁 Xcode project location Build/iOS/Unity-iPhone.xcodeproj"
    - |
      if [ -d "Build/iOS/Unity-iPhone.xcodeproj" ]; then
        echo "✅ Xcode project verified at Build/iOS/Unity-iPhone.xcodeproj"
      else
        echo " Xcode project not found!"
        exit 1
      fi

cleanup_build_workspace:
  stage: cleanup
  tags:
    - macos
  variables:
    GIT_STRATEGY: none
  script:
    - echo "Cleaning up build workspace to free disk space..."
    - echo "📊 Current disk space before cleanup:"
    - df -h | grep -E 'Filesystem|disk' || df -h
    - echo "Current CI_PROJECT_DIR $CI_PROJECT_DIR"

    # Calculate the concurrency root directory (e.g. .../builds/TOKEN/CONCURRENCY)
    # CI_PROJECT_DIR is usually .../CONCURRENCY/NAMESPACE/PROJECT
    # We go up 2 levels:
    # 1. .../CONCURRENCY/NAMESPACE
    # 2. .../CONCURRENCY
    - export TARGET_DIR=$(dirname $(dirname "$CI_PROJECT_DIR"))
    - echo "Target directory to delete $TARGET_DIR"

    - |
      if [ -d "$TARGET_DIR" ] && [[ "$TARGET_DIR" == *"/builds/"* ]]; then
        echo "Removing Directory $TARGET_DIR"
        # Move to a safe location before deleting
        cd /tmp
        rm -rf "$TARGET_DIR"
        echo "✅ Cleanup completed."
        echo "📊 Remaining disk space after cleanup:"
        df -h | grep -E 'Filesystem|disk' || df -h
      else
        echo "⚠️ Target directory seems unsafe to delete or does not exist: $TARGET_DIR"
        echo "Skipping cleanup to prevent accidental data loss."
      fi
  rules:
    - if: "$CI_COMMIT_TAG =~ /cleanup_build_workspace/"
      when: manual
    - when: manual
      allow_failure: true
